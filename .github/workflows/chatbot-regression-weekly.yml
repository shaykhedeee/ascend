name: Chatbot Regression Weekly

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  chatbot-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run chatbot regression suite
        run: npm run test:chatbot-regression
